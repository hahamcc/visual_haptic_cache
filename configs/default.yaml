dataset:
  root: /mnt/data/chi/visgel/seen/images
  split: "0"
  vision_name: vision
  touch_name: touch
  image_exts:
    - .jpg
    - .jpeg
    - .png

makesense:
  images_dir: data/makesense/images
  labels_csv: data/makesense/images/labels/makesense_labels.csv

outputs:
  processed_dir: data/processed
  phase1_debug_dir: outputs/debug/phase1

manifest:
  output_csv: data/processed/manifest.csv
  summary_json: data/processed/manifest_summary.json

sensor_localizer:
  labels_output_csv: data/processed/sensor_labels.csv
  tracks_output_csv: data/processed/sensor_tracks.csv
  records_output_txt: data/processed/makesense_records.txt
  summary_json: data/processed/sensor_label_summary.json
  debug_dir: outputs/debug/phase1/sensor_labels
  debug_samples: 24
  track_end: contact
  model:
    input_width: 192
    input_height: 128
    gaussian_sigma: 2.5
    batch_size: 16
    epochs: 80
    learning_rate: 0.001
    weight_decay: 0.00001
    seed: 42
    checkpoint_dir: checkpoints/sensor_localizer
    metrics_json: outputs/metrics/sensor_localizer_metrics.json
    predictions_csv: outputs/metrics/sensor_localizer_predictions.csv
    debug_dir: outputs/debug/phase1/sensor_localizer_model
    debug_samples: 24

contact_detection:
  output_csv: data/processed/contact_index.csv
  summary_json: data/processed/contact_summary.json
  records_file: data/processed/makesense_records.txt
  resize_width: 96
  resize_height: 96
  baseline_frames: 10
  min_frame: 5
  threshold_abs: 0.8
  threshold_std_factor: 6.0
  threshold_peak_ratio: 0.0
  consecutive_frames: 3
  debug_dir: outputs/debug/phase1/contact_detection
  debug_records: 20

region_dataset:
  output_csv: data/processed/region_dataset/region_samples.csv
  heatmap_dir: data/processed/region_dataset/heatmaps
  debug_dir: outputs/debug/phase1/region_dataset
  debug_samples: 30
  heatmap_width: 192
  heatmap_height: 128
  gaussian_sigma: 4.0
  split_train: 0.8
  split_val: 0.1
  split_test: 0.1

contact_region:
  samples_csv: data/processed/region_dataset/region_samples.csv
  checkpoint_dir: checkpoints/contact_region_baseline
  metrics_json: outputs/metrics/contact_region_baseline.json
  predictions_csv: outputs/metrics/contact_region_predictions.csv
  retrieval_json: outputs/metrics/contact_region_retrieval.json
  retrieval_csv: outputs/metrics/contact_region_retrieval.csv
  retrieval_direct_json: outputs/metrics/contact_region_retrieval_direct.json
  retrieval_direct_csv: outputs/metrics/contact_region_retrieval_direct.csv
  retrieval_hybrid_json: outputs/metrics/contact_region_retrieval_hybrid.json
  retrieval_hybrid_csv: outputs/metrics/contact_region_retrieval_hybrid.csv
  retrieval_compare_json: outputs/metrics/contact_region_retrieval_compare.json
  retrieval_compare_csv: outputs/metrics/contact_region_retrieval_compare.csv
  motion_tracks_csv: data/processed/sensor_tracks.csv
