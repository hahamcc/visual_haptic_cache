  retrieval_debug_dir: outputs/debug/phase2/retrieval
  retrieval_direct_debug_dir: outputs/debug/phase2/retrieval_direct
  retrieval_hybrid_debug_dir: outputs/debug/phase2/retrieval_hybrid
  debug_samples: 30
  input_width: 192
  input_height: 128
  geometry_sigma: 2.5
  batch_size: 16
  epochs: 120
  learning_rate: 0.001
  weight_decay: 0.00001
  seed: 42
  topk: 5
  topk_suppression_radius: 6
  bbox_half_size: 48
  contact_box_size: 48
  cache_crop_size: 48
  cache_motion_weight: 1.0
  cache_visual_weight: 1.0
  ttc_buckets:
    near:
